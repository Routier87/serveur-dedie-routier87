<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<title>Report</title>

<link rel="stylesheet"
href="assets/css/style.css">

</head>

<body>

<div class="login-box">

<h1>
Report
</h1>

<textarea id="message"
placeholder="Explique ton problème"></textarea>

<button onclick="sendWebhook()">

Envoyer

</button>

</div>

<script>

const webhook =
"METS_TON_WEBHOOK_ICI";

function sendWebhook() {

const message =
document.getElementById("message").value;

fetch(webhook, {

method: "POST",

headers: {
"Content-Type": "application/json"
},

body: JSON.stringify({

content:
"📢 Nouveau report :\n"
+
message

})

})

.then(() => {

alert("Report envoyé");

});

}

</script>

</body>
</html>
