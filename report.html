<body>

<div class="login-box">

<h1>
Report
</h1>

<textarea id="message"
placeholder="Explique ton problème"></textarea>

<button onclick="sendWebhook()">

Envoyer

</button>

</div>

<script>

const webhook =
"https://discord.com/api/webhooks/1504023720728072232/78AB-xmxOtFaXx5YobVWOCorCdwn96ajX9TYHPXqS6c5g4B6APKeCIYNjbXOS6E6S-0Q";

function sendWebhook() {

const message =
document.getElementById("message").value;

fetch(webhook, {

method: "POST",

headers: {
"Content-Type": "application/json"
},

body: JSON.stringify({

content:
"📢 Nouveau report :\n"
+
message

})

})

.then(() => {

alert("Report envoyé");

});

}

</script>
