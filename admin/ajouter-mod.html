<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<title>Ajouter Mods</title>

<link rel="stylesheet"
href="../assets/css/style.css">

</head>

<body>

<header>

<div class="logo">

<h1>
Ajouter Mods
</h1>

</div>

<nav>

<ul>

<li>
<a href="../index.html">
Accueil
</a>
</li>

<li>
<a href="panel.html">
Panel Admin
</a>
</li>

</ul>

</nav>

</header>

<div class="login-box">

<h1>
Ajouter une Mise à Jour
</h1>

<input type="text"
id="title"
placeholder="Titre">

<input type="text"
id="date"
placeholder="Date">

<input type="text"
id="size"
placeholder="Taille du fichier">

<input type="text"
id="link"
placeholder="Lien">

<button onclick="saveMod()">

Ajouter

</button>

</div>

<script>

function saveMod(){

const title =
document.getElementById("title").value;

const date =
document.getElementById("date").value;

const size =
document.getElementById("size").value;

const link =
document.getElementById("link").value;

const mods =
JSON.parse(localStorage.getItem("modsFolders"))
|| [];

mods.push({

title,
date,
size,
link

});

localStorage.setItem(
"modsFolders",
JSON.stringify(mods)
);

alert("Mise à jour ajoutée");

}

</script>

</body>
</html>
