<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Ajouter Mods
</title>

<link rel="stylesheet"
href="../assets/css/style.css">

</head>

<body>

<!-- HEADER -->

<header>

<div class="logo">

<h1>
Ajouter Mods
</h1>

</div>

<nav>

<ul>

<li>
<a href="../index.html">
Accueil
</a>
</li>

<li>
<a href="panel.html">
Panel Admin
</a>
</li>

</ul>

</nav>

</header>

<!-- FORMULAIRE -->

<div class="login-box">

<h1>
Ajouter une Mise à Jour
</h1>

<select id="server">

<option value="">
Choisir un serveur
</option>

<option value="mods-pc-saison">
Serveur PC Saison
</option>

<option value="mods-pc">
Serveur PC
</option>

<option value="mods-crossplay-saison">
Crossplay Saison
</option>

<option value="mods-crossplay">
Crossplay
</option>

</select>

<input type="text"
id="title"
placeholder="Titre du mod">

<input type="text"
id="date"
placeholder="Date">

<input type="text"
id="size"
placeholder="Taille du fichier">

<input type="text"
id="link"
placeholder="Lien de téléchargement">

<input type="text"
id="image"
placeholder="Image du mod (URL image)">

<button onclick="saveMod()">

Ajouter le Mod

</button>

<p id="status"></p>

</div>

<!-- SCRIPT -->

<script>

function saveMod(){

const server =
document.getElementById("server").value;

const title =
document.getElementById("title").value;

const date =
document.getElementById("date").value;

const size =
document.getElementById("size").value;

const link =
document.getElementById("link").value;

const image =
document.getElementById("image").value;

if(
server === "" ||
title === "" ||
date === "" ||
size === "" ||
link === ""
){

alert(
"Veuillez remplir tous les champs."
);

return;

}

const mods =
JSON.parse(
localStorage.getItem(server)
)
|| [];

mods.push({

title,
date,
size,
link,
image

});

localStorage.setItem(
server,
JSON.stringify(mods)
);

document.getElementById(
"status"
).innerText =

"✅ Mod ajouté avec succès";

document.getElementById("title").value = "";
document.getElementById("date").value = "";
document.getElementById("size").value = "";
document.getElementById("link").value = "";
document.getElementById("image").value = "";
document.getElementById("server").value = "";

}

</script>

</body>
</html>
