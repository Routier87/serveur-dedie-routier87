<!DOCTYPE html>

<h2 id="profile-name">Utilisateur</h2>
<p id="profile-role">Membre</p>

<input type="text" id="new-username" placeholder="Nouveau pseudo">
<input type="password" id="new-password" placeholder="Nouveau mot de passe">

<button onclick="saveProfile()">Sauvegarder</button>
<button class="logout-btn" onclick="logout()">Déconnexion</button>

</div>

</section>

<script>

const currentUser = localStorage.getItem("currentUser");
const currentRole = localStorage.getItem("adminRole") || "Membre";

document.getElementById("profile-name").innerText = currentUser || "Utilisateur";
document.getElementById("profile-role").innerText = currentRole;

function saveProfile(){

const newUsername = document.getElementById("new-username").value;
const newPassword = document.getElementById("new-password").value;

let users = JSON.parse(localStorage.getItem("users")) || [];

const index = users.findIndex(u => u.username === currentUser);

if(index !== -1){

if(newUsername !== ""){
users[index].username = newUsername;
localStorage.setItem("currentUser",newUsername);
}

if(newPassword !== ""){
users[index].password = newPassword;
}

localStorage.setItem("users",JSON.stringify(users));
alert("Profil sauvegardé");
location.reload();
}
}

function logout(){
localStorage.removeItem("isUser");
localStorage.removeItem("isAdmin");
localStorage.removeItem("currentUser");
window.location.href = "login.html";
}

</script>

</body>
</html>
