<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Profil
</title>

<link rel="stylesheet"
href="assets/css/style.css">

</head>

<body>

<script>

const isUser =
localStorage.getItem("isUser");

const isAdmin =
localStorage.getItem("isAdmin");

if(
isUser !== "true"
&&
isAdmin !== "true"
){

window.location.href =
"login.html";

}

</script>

<header>

<div class="logo">

<img src="assets/images/logo.png">

<h1>
Mon Profil
</h1>

</div>

<nav>

<ul>

<li>
<a href="index.html">
Accueil
</a>
</li>

<li>
<a href="mods.html">
Mods
</a>
</li>

<li>
<a href="report.html">
Report
</a>
</li>

<li>
<a href="profile.html">
Profil
</a>
</li>

</ul>

</nav>

</header>

<section class="profile-page">

<div class="profile-box">

<img src="assets/images/default-avatar.png"
class="avatar">

<h2 id="profile-name">

Utilisateur

</h2>

<p id="profile-role">

Membre

</p>

<input type="text"
id="new-username"
placeholder="Nouveau pseudo">

<input type="password"
id="new-password"
placeholder="Nouveau mot de passe">

<button onclick="saveProfile()">

Sauvegarder

</button>

<button class="logout-btn"
onclick="logout()">

Déconnexion

</button>

</div>

</section>

<script>

/* USER CONNECTÉ */

const currentUser =
localStorage.getItem("currentUser");

const currentRole =
localStorage.getItem("adminRole")
|| "Membre";

document.getElementById(
"profile-name"
).innerText =
currentUser || "Utilisateur";

document.getElementById(
"profile-role"
).innerText =
currentRole;

/* SAUVEGARDE PROFIL */

function saveProfile(){

const newUsername =
document.getElementById(
"new-username"
).value;

const newPassword =
document.getElementById(
"new-password"
).value;

let users =
JSON.parse(
localStorage.getItem("users")
)
|| [];

const index =
users.findIndex(
u => u.username === currentUser
);

if(index !== -1){

if(newUsername !== ""){

users[index].username =
newUsername;

localStorage.setItem(
"currentUser",
newUsername
);

}

if(newPassword !== ""){

users[index].password =
newPassword;

}

localStorage.setItem(
"users",
JSON.stringify(users)
);

alert("Profil sauvegardé");

location.reload();

}

}

/* DÉCONNEXION */

function logout(){

localStorage.removeItem(
"isUser"
);

localStorage.removeItem(
"isAdmin"
);

localStorage.removeItem(
"currentUser"
);

window.location.href =
"login.html";

}

</script>

</body>
</html>
